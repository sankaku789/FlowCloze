- id: sem-001
  mode: context
  title: セマフォ
  source_text: |-
    セマフォはOSが提供するプロセス間同期機能の一つである。
    P命令はリソースの獲得を要求し，許可されない場合は待ち状態へ移行する。
    V命令はリソースを解放する。
